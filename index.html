<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaSH OTT • Ultra Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #00f0ff;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif;
            font-weight: 600;
        }

        .glass {
            background: rgba(255,255,255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255, 0.1);
        }

        .neon-text {
            text-shadow: 0 0 10px rgb(0 240 255 / 50%),
                        0 0 20px rgb(0 240 255 / 30%);
        }

        .section-header {
            font-size: 2.1rem;
            line-height: 1.05;
            font-weight: 700;
            letter-spacing: -.04em;
        }

        .poster-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .poster-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        .poster-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom, 
                transparent 40%, 
                rgba(15, 23, 42, 0.85) 90%
            );
            transition: all .3s ease;
        }
        
        .poster-card:hover::after {
            background: linear-gradient(
                to bottom, 
                transparent 20%, 
                rgba(15, 23, 42, 0.75) 80%
            );
        }

        .modern-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.35rem;
        }

        .stream-item {
            transition: all .2s ease;
        }
        
        .stream-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgb(0 240 255 / 0.15);
        }

        .nav-active {
            color: #00f0ff;
            position: relative;
        }
        
        .nav-active:after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, #00f0ff, transparent);
        }

        .ultra-gradient {
            background: linear-gradient(145deg, #0f172a, #020617);
        }

        .content-grid {
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }

        .stremio-pill {
            font-size: 0.65rem;
            padding-top: 1px;
            padding-bottom: 1px;
        }

        .modal {
            animation: modalPop 0.3s ease forwards;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(40px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .video-container {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.6);
            border: 1px solid rgba(255,255,255,.08);
        }

        .poster-img {
            transition: transform .4s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        box-shadow .3s ease;
        }
        
        .poster-card:hover .poster-img {
            transform: scale(1.08);
        }

        .metric {
            font-size: 0.75rem;
            letter-spacing: -.5px;
        }

        .catalog-tab {
            transition: all 0.2s ease;
        }
        
        .catalog-tab.active {
            background: rgba(0, 240, 255, 0.1);
            color: #00f0ff;
            border-color: #00f0ff;
        }

        .app-container {
            max-width: 1480px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .hero-bg {
            background: radial-gradient(at center, #0f172a 0%, #020617 70%);
        }
    </style>
</head>
<body class="bg-slate-950 text-white ultra-gradient">
    <!-- Navbar -->
    <nav class="border-b border-slate-800 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto">
            <div class="px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <!-- Logo -->
                    <div class="flex items-center gap-x-2.5">
                        <div class="w-11 h-11 flex items-center justify-center bg-gradient-to-br from-cyan-400 to-teal-400 rounded-2xl shadow-inner">
                            <span class="text-slate-950 font-black text-3xl tracking-tighter font-display">J</span>
                        </div>
                        <div>
                            <span class="font-display text-3xl font-extrabold tracking-tighter">JaSH</span>
                            <span class="font-display text-3xl font-extrabold tracking-tighter bg-gradient-to-r from-cyan-400 to-teal-300 bg-clip-text text-transparent">OTT</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-2">
                    <!-- Search -->
                    <div class="relative w-80 hidden md:block">
                        <input id="global-search" 
                               type="text" 
                               placeholder="Search movies, series..." 
                               class="w-full bg-slate-900 border border-slate-700 focus:border-cyan-400 transition-colors text-sm outline-none px-4 py-[9px] pl-[46px] rounded-3xl">
                        <i class="fa-solid fa-search absolute left-4 top-3 text-slate-400"></i>
                    </div>
                    
                    <div class="flex items-center bg-slate-900 border border-slate-700 rounded-3xl p-1">
                        <div class="px-3 py-1.5 flex items-center gap-x-2">
                            <div class="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-pulse"></div>
                            <span class="text-xs font-semibold text-emerald-300">Live • 42k</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Hero -->
    <div class="max-w-screen-2xl mx-auto px-8 pt-9 pb-7">
        <div class="flex flex-col lg:flex-row items-end justify-between gap-6">
            <div>
                <div class="flex items-center gap-x-[9px]">
                    <div class="px-4 py-1.5 text-xs font-extrabold tracking-[1.25px] flex items-center gap-2 border border-cyan-900 bg-cyan-900/10 text-cyan-300 rounded-3xl">
                        <i class="fa-solid fa-satellite fa-fw"></i> 
                        <span class="font-bold">STREMIO POWERED</span>
                    </div>
                    <div class="px-3 py-1 text-[10px] font-extrabold tracking-wider bg-white/5 border border-white/10 text-white/70 flex items-center rounded-3xl px-3.5 h-fit" style="font-size: 9.5px; padding-top: 4.5px; padding-bottom: 4.5px;">
                        v1.0.0
                    </div>
                </div>
                
                <h1 class="font-display text-7xl leading-none font-extrabold tracking-tighter mt-1.5">Cinema.<br>Reimagined.</h1>
                <p class="max-w-md mt-3 text-lg text-slate-300">Ultra-modern streaming experience powered by community M3U playlists &amp; TMDB.</p>
                
                <div class="flex items-center gap-x-3 mt-6">
                    <button onclick="document.getElementById('movies-tab').click()" 
                            class="px-7 transition-all hover:scale-105 flex items-center justify-center gap-3 font-extrabold shadow-lg shadow-cyan-900/30 text-sm py-[13.5px] bg-white text-slate-900 hover:bg-white rounded-3xl px-8">
                        <span>Browse Content</span>
                    </button>
                    
                    <button onclick="showRandomContent()" 
                            class="transition-all px-6 flex items-center justify-center gap-2 font-semibold py-[13.5px] px-5 border border-white/20 hover:bg-white/5 text-sm rounded-3xl">
                        <i class="fa-solid fa-dice"></i> 
                        <span>Surprise me</span>
                    </button>
                </div>
            </div>
            
            <div class="hidden xl:flex items-center gap-x-4 text-sm">
                <div class="glass px-4 py-3 rounded-3xl flex items-center gap-x-3">
                    <div>
                        <div class="font-bold text-emerald-300">124k</div>
                        <div class="text-xs text-emerald-300/70">Streams today</div>
                    </div>
                </div>
                <div class="glass px-4 py-3 rounded-3xl flex items-center gap-x-3">
                    <div>
                        <div class="font-bold">8.4m</div>
                        <div class="text-xs text-white/40">Titles available</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="max-w-screen-2xl mx-auto px-8 pt-2">
        <div class="flex items-center gap-x-1 border-b border-slate-800 pb-1">
            <button onclick="switchCatalog('movie', 'm3u-movies', this)" id="movies-tab"
                    class="catalog-tab active px-6 py-[9px] flex items-center gap-x-2 text-sm font-extrabold px-5 transition-colors border-b-2 border-cyan-400 rounded-t-3xl bg-slate-900">
                <i class="fa-solid fa-film mr-1.5"></i> 
                <span>Movies</span>
            </button>
            
            <button onclick="switchCatalog('series', 'm3u-series', this)"
                    class="catalog-tab px-6 py-[9px] flex items-center gap-x-2 text-sm font-extrabold px-5 transition-colors hover:bg-slate-900 rounded-t-3xl border-b-2 border-transparent">
                <i class="fa-solid fa-tv mr-1.5"></i> 
                <span>Series</span>
            </button>
            
            <button onclick="switchCatalog('movie', 'm3u-dubbed', this)"
                    class="catalog-tab px-6 py-[9px] flex items-center gap-x-2 text-sm font-extrabold px-5 transition-colors hover:bg-slate-900 rounded-t-3xl border-b-2 border-transparent">
                <i class="fa-solid fa-microphone mr-1.5"></i> 
                <span>Dubbed</span>
            </button>
            
            <div class="flex-1"></div>
            
            <div class="flex items-center px-1 text-xs">
                <div class="px-3 py-1 bg-slate-900 border border-slate-700 text-white/70 rounded-3xl text-xs flex items-center gap-1.5">
                    <span id="catalog-count">128</span> 
                    <span class="font-medium">items</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Content Grid -->
    <div class="max-w-screen-2xl mx-auto px-8 pt-7 pb-10">
        <div id="content-grid" class="modern-grid">
            <!-- Populated via JS -->
        </div>
        
        <div id="loading-indicator" class="hidden flex justify-center py-8">
            <div class="flex items-center gap-x-3 text-sm">
                <i class="fa-solid fa-spinner fa-spin text-cyan-400"></i> 
                <span class="font-semibold text-slate-300">Fetching content...</span>
            </div>
        </div>
        
        <div class="pt-5 flex justify-center">
            <button onclick="loadMoreContent()" id="load-more-btn"
                    class="hidden px-5 text-sm font-extrabold py-3 transition-colors items-center gap-2 justify-center px-6 hover:bg-slate-900 border border-slate-700 text-slate-300 rounded-3xl text-xs">
                <span>Load more</span> <i class="fa-solid fa-arrow-down ml-1"></i>
            </button>
        </div>
    </div>
    
    <!-- Item Modal -->
    <div id="item-modal" onclick="if (event.target.id === 'item-modal') closeModal()" class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[90] flex items-end lg:items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="modal w-full lg:w-[640px] lg:m-4 lg:rounded-3xl bg-slate-900 border border-slate-700 lg:max-h-[88vh] max-h-[92vh] overflow-hidden flex flex-col">
            
            <!-- Modal Header -->
            <div class="px-5 pt-5 pb-3 flex justify-between items-center border-b border-slate-700">
                <div class="flex items-center gap-x-3">
                    <div id="modal-type-pill" 
                         class="px-3 py-1 text-xs font-extrabold flex items-center justify-center bg-slate-800 rounded-2xl text-cyan-300" style="font-size: .68rem; padding-left: 10.5px; padding-right: 10.5px;">
                    </div>
                    <div id="modal-year" class="text-xs px-1 font-extrabold text-white/60"></div>
                </div>
                
                <button onclick="closeModal()" class="w-9 h-9 flex items-center justify-center hover:bg-slate-800 transition-colors text-xl text-white/70 hover:text-white rounded-2xl">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <div class="flex flex-col lg:flex-row">
                <!-- Poster in modal -->
                <div class="lg:w-[200px] px-5 pt-5 lg:pt-5 pb-2 lg:pb-5">
                    <img id="modal-poster" class="w-full aspect-[2/3] lg:w-[190px] shadow-xl object-cover rounded-3xl border border-slate-700" alt="">
                </div>
                
                <div class="flex-1 px-5 pb-5 pt-3 lg:pt-5">
                    <div id="modal-name" class="font-extrabold text-3xl leading-none tracking-tighter"></div>
                    
                    <div id="modal-description" class="mt-3 text-sm leading-tight text-white/70 line-clamp-3">
                    </div>
                    
                    <!-- Streams Section -->
                    <div class="mt-6">
                        <div class="flex items-center justify-between mb-3 px-1">
                            <div class="font-extrabold text-sm flex items-center gap-x-[5px]">
                                <span>Available Streams</span>
                            </div>
                            <div id="stream-count" class="px-3 text-xs py-[1px] flex items-center justify-center font-black bg-cyan-900/20 text-cyan-300 rounded-[2rem]" style="font-size: 10.25px; padding-left: 8.5px; padding-right: 8.5px; height: 18px;">
                            </div>
                        </div>
                        
                        <div id="streams-list" class="max-h-[210px] overflow-auto pr-1 content-grid space-y-[5px]">
                            <!-- Streams populated dynamically -->
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    
    <!-- Video Player Modal -->
    <div id="video-modal" onclick="if (event.target.id === 'video-modal') closeVideoModal()" class="hidden fixed inset-0 bg-black/90 z-[120] flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="w-full max-w-[1050px] mx-4 lg:mx-auto">
            
            <div class="flex justify-between px-1 pb-3 items-center">
                <div class="px-4">
                    <div id="video-modal-title" class="font-extrabold text-xl"></div>
                    <div id="video-modal-stream-info" class="text-xs text-cyan-300 font-bold"></div>
                </div>
                
                <button onclick="closeVideoModal()" 
                        class="px-5 flex items-center justify-center text-sm font-extrabold py-2.5 px-4 bg-slate-900 hover:bg-red-900/30 transition-colors text-red-300 border border-red-900/30 rounded-3xl text-xs">
                    <i class="fa-solid fa-times mr-2"></i> 
                    <span>Close player</span>
                </button>
            </div>
            
            <div class="video-container bg-slate-900 border border-slate-700 rounded-3xl overflow-hidden shadow-2xl">
                <video id="player-video" class="w-full aspect-video bg-black" controls autoplay></video>
                
                <div class="px-5 py-[7px] flex items-center justify-between bg-slate-900 border-t border-slate-700">
                    <div class="px-1 flex items-center gap-x-2 text-xs">
                        <div class="px-3 flex items-center justify-center text-emerald-300 text-xs font-extrabold bg-emerald-900/10 h-6 px-[8.5px] rounded-2xl">
                            <span>HD</span>
                        </div>
                        <div class="text-xs font-medium text-white/50">Direct stream from M3U</div>
                    </div>
                    
                    <div onclick="attemptBypass()" class="cursor-pointer px-3 transition-colors text-xs flex items-center justify-center gap-1.5 hover:text-cyan-300 text-white/60 font-extrabold" style="font-size: .67rem">
                        <i class="fa-solid fa-shield-halved fa-fw"></i> 
                        <span>Bypass restriction</span>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind script
        function initializeTailwind() {
            document.documentElement.style.setProperty('--accent', '#00f0ff');
            
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            'display': ['Space Grotesk', 'system-ui', 'sans-serif']
                        }
                    }
                }
            };
        }
        
        let currentCatalog = {
            type: 'movie',
            id: 'm3u-movies',
            skip: 0
        };
        
        let currentItems = [];
        let currentModalItem = null;
        
        const BASE_URL = 'https://stremiotesting-production.up.railway.app';
        
        function showLoading(show) {
            const loader = document.getElementById('loading-indicator');
            if (show) {
                loader.classList.remove('hidden');
                loader.classList.add('flex');
            } else {
                loader.classList.remove('flex');
                loader.classList.add('hidden');
            }
        }
        
        async function fetchCatalog(type, catalogId, skip = 0) {
            showLoading(true);
            
            try {
                const url = `${BASE_URL}/catalog/${type}/${catalogId}.json?skip=${skip}`;
                const res = await fetch(url);
                const data = await res.json();
                
                return data.metas || [];
            } catch (err) {
                console.error(err);
                return [];
            } finally {
                showLoading(false);
            }
        }
        
        async function fetchStreams(type, id) {
            try {
                const url = `${BASE_URL}/stream/${type}/${id}.json`;
                const res = await fetch(url);
                const data = await res.json();
                return data.streams || [];
            } catch (err) {
                console.error('Error fetching streams:', err);
                return [];
            }
        }
        
        function renderItems(items, append = false) {
            const grid = document.getElementById('content-grid');
            
            if (!append) {
                grid.innerHTML = '';
                currentItems = items;
            } else {
                currentItems = [...currentItems, ...items];
            }
            
            items.forEach(item => {
                const cardHTML = `
                    <div onclick="showItemModal('${item.id}', '${item.type}', this)" class="poster-card cursor-pointer group bg-slate-900 border border-slate-700 hover:border-cyan-700/60 rounded-3xl overflow-hidden shadow-xl">
                        <div class="relative">
                            <img src="${item.poster || 'https://picsum.photos/id/1015/600/900'}" 
                                 class="poster-img w-full aspect-[2/2.95] object-cover" 
                                 onerror="this.src='https://picsum.photos/id/1015/600/900'">
                            
                            <div class="absolute top-3 right-3">
                                <div class="px-2 py-1 text-[10px] font-extrabold flex items-center justify-center bg-black/70 backdrop-blur-md text-white rounded-[2rem]" style="font-size:9.5px; padding-top:1.5px; padding-bottom:1.5px; padding-left:7.5px; padding-right:7.5px;">
                                    <span>${item.year || '2026'}</span>
                                </div>
                            </div>
                            
                            <div class="px-3 py-[7.5px] absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/90 to-transparent flex items-end">
                                <div class="px-3 pb-3 w-full">
                                    <div class="font-extrabold text-white text-[13.5px] line-clamp-2 leading-[1.05] tracking-tighter">${item.name}</div>
                                </div>
                            </div>
                            
                            <div class="px-3 absolute top-3 left-3">
                                <div class="px-[7.5px] text-center text-white flex items-center justify-center text-[8.5px] font-black py-[.5px] bg-gradient-to-r from-cyan-400 to-teal-300 rounded-[2.5rem] text-slate-900" style="font-size: 8.3px; height: 15.5px; padding-left: 7px; padding-right: 7px;">
                                    <span class="font-extrabold">${item.type.toUpperCase()}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                grid.innerHTML += cardHTML;
            });
            
            // Update count
            document.getElementById('catalog-count').innerHTML = currentItems.length;
        }
        
        async function switchCatalog(type, catalogId, element) {
            // Deactivate all tabs
            document.querySelectorAll('.catalog-tab').forEach(el => {
                el.classList.remove('active', 'border-cyan-400');
                el.classList.add('border-transparent');
            });
            
            // Activate current
            element.classList.add('active', 'border-cyan-400');
            element.classList.remove('border-transparent');
            
            currentCatalog = { type, id: catalogId, skip: 0 };
            
            const items = await fetchCatalog(type, catalogId, 0);
            renderItems(items);
            
            // Show/hide load more
            const loadBtn = document.getElementById('load-more-btn');
            loadBtn.style.display = (items.length >= 20) ? 'flex' : 'none';
            loadBtn.onclick = () => loadMoreContent();
        }
        
        async function loadMoreContent() {
            const loadBtn = document.getElementById('load-more-btn');
            loadBtn.style.display = 'none';
            
            currentCatalog.skip += 20;
            
            const newItems = await fetchCatalog(
                currentCatalog.type, 
                currentCatalog.id, 
                currentCatalog.skip
            );
            
            if (newItems.length > 0) {
                renderItems(newItems, true);
                loadBtn.style.display = 'flex';
            } else {
                loadBtn.style.display = 'none';
            }
        }
        
        async function showItemModal(itemId, type, cardElement) {
            const modal = document.getElementById('item-modal');
            modal.style.display = 'flex';
            
            // Find item in memory
            const item = currentItems.find(i => i.id === itemId) || {};
            
            currentModalItem = { ...item, type };
            
            // Fill basic info
            document.getElementById('modal-name').innerHTML = item.name || 'Untitled';
            document.getElementById('modal-year').innerHTML = item.year || '';
            document.getElementById('modal-poster').src = item.poster || 'https://picsum.photos/id/1015/600/900';
            
            const pill = document.getElementById('modal-type-pill');
            pill.innerHTML = `<span class="font-black">${type.toUpperCase()}</span>`;
            
            // Clear streams
            document.getElementById('streams-list').innerHTML = `
                <div class="flex items-center justify-center py-8 px-4">
                    <div>
                        <i class="fa-solid fa-spinner fa-spin text-cyan-300 text-lg mx-auto block mb-2"></i> 
                        <span class="font-extrabold text-xs text-center block text-cyan-300">Fetching streams...</span>
                    </div>
                </div>
            `;
            document.getElementById('stream-count').innerHTML = '0';
            
            // Fetch streams
            const streams = await fetchStreams(type, itemId);
            
            const streamContainer = document.getElementById('streams-list');
            streamContainer.innerHTML = '';
            
            document.getElementById('stream-count').innerHTML = streams.length;
            
            if (streams.length === 0) {
                streamContainer.innerHTML = `
                    <div class="px-5 py-7 text-center bg-slate-950 border border-slate-700 rounded-3xl">
                        <div class="text-xs text-center font-bold">No streams found for this title.</div>
                    </div>
                `;
                return;
            }
            
            streams.forEach((stream, index) => {
                const streamName = stream.name || stream.title || `Stream #${index + 1}`;
                const quality = stream.quality || (stream.url.includes('.m3u8') ? 'HLS' : 'MP4');
                
                const streamEl = document.createElement('div');
                streamEl.className = `stream-item flex items-center justify-between px-4 py-[9.5px] bg-slate-800 border border-slate-700 hover:border-cyan-700/70 cursor-pointer rounded-3xl`;
                
                streamEl.innerHTML = `
                    <div class="flex items-center gap-x-3">
                        <div>

        function closeModal() {

        function playStream(streamUrl, streamTitle, itemTitle) {
            closeModal();
            
            const videoModal = document.getElementById('video-modal');
            const videoEl = document.getElementById('player-video');
            const titleEl = document.getElementById('video-modal-title');
            const infoEl = document.getElementById('video-modal-stream-info');
            
            videoModal.style.display = 'flex';
            
            titleEl.innerHTML = itemTitle;
            infoEl.innerHTML = streamTitle;
            
            // Clear previous
            if (currentPlayer) {
                currentPlayer.pause();
                currentPlayer.src = '';
            }
            
            // Set new source
            videoEl.src = streamUrl;
            videoEl.load();
            
            // Try to play
            setTimeout(() => {
                videoEl.play().catch(() => {});

        function handleVideoError(videoElement, originalUrl) {

            container.innerHTML = `

                            <span>Try bypass</span>
                        </button>

        function attemptBypass(originalUrl = null, btnElement = null) {
            const videoModal = document.getElementById('video-modal');
            const videoEl = document.getElementById('player-video');
            
            if (!originalUrl && videoEl.src) originalUrl = videoEl.src;
            
            // Show bypass info
            if (btnElement) {
                btnElement.innerHTML = `<span class="font-extrabold">Bypassing...</span>`;
            }
            
            // For static apps, we simulate bypass by opening in new tab with a note
            // Real bypass would require a server proxy.
            setTimeout(function() {
                const newWin = window.open(originalUrl, '_blank');
                
                if (newWin) {
                    closeVideoModal();
                    
                    // Show success toast
                    showToastNotification('Opened in new tab. If blocked, try a different stream.');
                } else {
                    // fallback
                    alert('Please allow pop-ups to open the stream in a new tab.');
                }
            }, 650);
        }
        
        function showToastNotification(text) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translate(-50%, 0);z-index:999999';
            toast.className = `px-5 shadow-2xl text-xs font-extrabold flex items-center py-[10.5px] px-6 bg-slate-900 border border-slate-600 text-white rounded-[3rem]`;
            toast.innerHTML = `
                <div class="px-1 flex items-center">
                    <span>${text}</span>
                </div>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transitionDuration = '210ms';
                toast.style.transitionProperty = 'all';
                toast.style.opacity = '0';
                
                setTimeout(function() {
                    toast.parentNode.removeChild(toast);
                }, 200);
            }, 3700);
        }
        
        function closeVideoModal() {
            const videoModal = document.getElementById('video-modal');
            const videoEl = document.getElementById('player-video');
            
            videoModal.style.display = 'none';
            
            if (videoEl) {
                videoEl.pause();
                videoEl.src = '';
            }
        }
        
        function initializeSearch() {
            const searchInput = document.getElementById('global-search');
            
            searchInput.addEventListener('input', () => {
                const term = searchInput.value.toLowerCase().trim();
                
                if (!term) {
                    // Re-render full current items
                    const grid = document.getElementById('content-grid');
                    grid.innerHTML = '';
                    renderItems(currentItems);
                    return;
                }
                
                const filtered = currentItems.filter(item => 
                    item.name.toLowerCase().includes(term)
                );
                
                const grid = document.getElementById('content-grid');
                grid.innerHTML = '';
                
                if (filtered.length > 0) {
                    renderItems(filtered);
                } else {
                    grid.innerHTML = `
                        <div class="col-span-full py-6 px-5 text-center">
                            <div class="text-sm font-extrabold">No matches found.</div>
                        </div>
                    `;
                }
            });
            
            // Bonus: allow Enter to focus
            searchInput.addEventListener('keyup', function(ev) {
                if (ev.key === 'Enter' && currentItems.length > 0) {
                    const firstMatch = currentItems.find(i => i.name.toLowerCase().includes(searchInput.value.toLowerCase()));
                    if (firstMatch) {
                        showItemModal(firstMatch.id, firstMatch.type);
                    }
                }
            });
        }
        
        function showRandomContent() {
            if (!currentItems.length) return;
            
            const randomIndex = Math.floor(Math.random() * currentItems.length);
            const randomItem = currentItems[randomIndex];
            
            showItemModal(randomItem.id, randomItem.type);
        }
        
        async function initializeApp() {
            initializeTailwind();
            
            // Default: Load Movies
            const moviesTab = document.getElementById('movies-tab');
            moviesTab.classList.add('active', 'border-cyan-400');
            
            const initialItems = await fetchCatalog('movie', 'm3u-movies', 0);
            renderItems(initialItems);
            
            // Show load more initially
            const loadBtn = document.getElementById('load-more-btn');
            if (initialItems.length >= 20) {
                loadBtn.style.display = 'flex';
            }
            
            initializeSearch();
            
            // Easter egg: console message
            console.log('%c[JaSH OTT] Ultra modern static Stremio frontend initialized.', 'color:rgb(163, 163, 172)');
            
            // Optional: pre-load some series in background for faster switching
            setTimeout(() => {
                fetchCatalog('series', 'm3u-series', 0);
            }, 4000);
        }
        
        // Boot app
        window.onload = initializeApp;
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.metaKey && e.key === "/") {
                e.preventDefault();
                document.getElementById('global-search').focus();
            }
            
            if (e.key === "?" && document.activeElement.tagName === "BODY") {
                const modal = document.getElementById('item-modal');
                if (!modal.classList.contains('hidden') && modal.style.display !== 'none') {
                    e.preventDefault();
                }
            }
        });
    </script>
