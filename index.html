<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaSH OTT • Ultra Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .font-display {
            font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif;
            font-weight: 600;
        }

        .glass {
            background: rgba(255,255,255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255, 0.1);
        }

        .modern-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.35rem;
        }

        .poster-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .poster-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        .ultra-gradient {
            background: linear-gradient(145deg, #0f172a, #020617);
        }

        .content-grid {
            scrollbar-width: thin;
            scrollbar-color: #334155 #0f172a;
        }

        .modal {
            animation: modalPop 0.3s ease forwards;
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.85) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-950 text-white ultra-gradient">
    <!-- Navbar -->
    <nav class="border-b border-slate-800 bg-slate-900/70 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto">
            <div class="px-8 py-5 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="flex items-center gap-x-2.5">
                        <div class="w-11 h-11 flex items-center justify-center bg-gradient-to-br from-cyan-400 to-teal-400 rounded-2xl">
                            <span class="text-slate-950 font-black text-3xl tracking-tighter font-display">J</span>
                        </div>
                        <div>
                            <span class="font-display text-3xl font-extrabold tracking-tighter">JaSH</span>
                            <span class="font-display text-3xl font-extrabold tracking-tighter bg-gradient-to-r from-cyan-400 to-teal-300 bg-clip-text text-transparent">OTT</span>
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-x-2">
                    <div class="relative w-80 hidden md:block">
                        <input id="global-search" type="text" placeholder="Search movies, series..." 
                               class="w-full bg-slate-900 border border-slate-700 focus:border-cyan-400 transition-colors text-sm outline-none px-4 py-[9px] pl-[46px] rounded-3xl">
                        <i class="fa-solid fa-search absolute left-4 top-3 text-slate-400"></i>
                    </div>
                    
                    <div class="flex items-center bg-slate-900 border border-slate-700 rounded-3xl p-1">
                        <div class="px-3 py-1.5 flex items-center gap-x-2">
                            <div class="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-pulse"></div>
                            <span class="text-xs font-semibold text-emerald-300">Live • 42k</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Hero -->
    <div class="max-w-screen-2xl mx-auto px-8 pt-9 pb-7">
        <div class="flex flex-col lg:flex-row items-end justify-between gap-6">
            <div>
                <div class="flex items-center gap-x-[9px]">
                    <div class="px-4 py-1.5 text-xs font-extrabold tracking-[1.25px] flex items-center gap-2 border border-cyan-900 bg-cyan-900/10 text-cyan-300 rounded-3xl">
                        <i class="fa-solid fa-satellite fa-fw"></i> 
                        <span class="font-bold">STREMIO POWERED</span>
                    </div>
                    <div class="px-3 py-1 text-[10px] font-extrabold tracking-wider bg-white/5 border border-white/10 text-white/70 flex items-center rounded-3xl px-3.5 h-fit" style="font-size: 9.5px;">
                        v1.0.0
                    </div>
                </div>
                
                <h1 class="font-display text-7xl leading-none font-extrabold tracking-tighter mt-1.5">Cinema.<br>Reimagined.</h1>
                <p class="max-w-md mt-3 text-lg text-slate-300">Ultra-modern streaming experience powered by community M3U playlists &amp; TMDB.</p>
                
                <div class="flex items-center gap-x-3 mt-6">
                    <button onclick="document.getElementById('movies-tab').click()" 
                            class="px-7 transition-all hover:scale-105 flex items-center justify-center gap-3 font-extrabold shadow-lg shadow-cyan-900/30 text-sm py-[13.5px] bg-white text-slate-900 hover:bg-white rounded-3xl px-8">
                        <span>Browse Content</span>
                    </button>
                    
                    <button onclick="showRandomContent()" 
                            class="transition-all px-6 flex items-center justify-center gap-2 font-semibold py-[13.5px] px-5 border border-white/20 hover:bg-white/5 text-sm rounded-3xl">
                        <i class="fa-solid fa-dice"></i> 
                        <span>Surprise me</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Tabs -->
    <div class="max-w-screen-2xl mx-auto px-8 pt-2">
        <div class="flex items-center gap-x-1 border-b border-slate-800 pb-1">
            <button onclick="switchCatalog('movie', 'm3u-movies', this)" id="movies-tab"
                    class="catalog-tab active px-6 py-[9px] flex items-center gap-x-2 text-sm font-extrabold px-5 transition-colors border-b-2 border-cyan-400 rounded-t-3xl bg-slate-900">
                <i class="fa-solid fa-film mr-1.5"></i> 
                <span>Movies</span>
            </button>
            
            <button onclick="switchCatalog('series', 'm3u-series', this)"
                    class="catalog-tab px-6 py-[9px] flex items-center gap-x-2 text-sm font-extrabold px-5 transition-colors hover:bg-slate-900 rounded-t-3xl border-b-2 border-transparent">
                <i class="fa-solid fa-tv mr-1.5"></i> 
                <span>Series</span>
            </button>
            
            <button onclick="switchCatalog('movie', 'm3u-dubbed', this)"
                    class="catalog-tab px-6 py-[9px] flex items-center gap-x-2 text-sm font-extrabold px-5 transition-colors hover:bg-slate-900 rounded-t-3xl border-b-2 border-transparent">
                <i class="fa-solid fa-microphone mr-1.5"></i> 
                <span>Dubbed</span>
            </button>
            
            <div class="flex-1"></div>
            
            <div class="flex items-center px-1 text-xs">
                <div class="px-3 py-1 bg-slate-900 border border-slate-700 text-white/70 rounded-3xl text-xs flex items-center gap-1.5">
                    <span id="catalog-count">0</span> 
                    <span class="font-medium">items</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Content Grid -->
    <div class="max-w-screen-2xl mx-auto px-8 pt-7 pb-10">
        <div id="content-grid" class="modern-grid"></div>
        
        <div id="loading-indicator" class="hidden flex justify-center py-8">
            <div class="flex items-center gap-x-3 text-sm">
                <i class="fa-solid fa-spinner fa-spin text-cyan-400"></i> 
                <span class="font-semibold text-slate-300">Fetching content...</span>
            </div>
        </div>
        
        <div class="pt-5 flex justify-center">
            <button onclick="loadMoreContent()" id="load-more-btn"
                    class="hidden px-5 text-sm font-extrabold py-3 transition-colors items-center gap-2 justify-center px-6 hover:bg-slate-900 border border-slate-700 text-slate-300 rounded-3xl text-xs">
                <span>Load more</span> <i class="fa-solid fa-arrow-down ml-1"></i>
            </button>
        </div>
    </div>
    
    <!-- Modals will be injected by JS -->
    <div id="modals-container"></div>

    <!-- Load config first -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
